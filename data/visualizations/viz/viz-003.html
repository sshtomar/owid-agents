<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  body { font-family: 'Inter', sans-serif; margin: 0; padding: 32px 40px; background: #F6F5EE; color: #2B2A27; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
  .subtitle { font-size: 11px; color: #7A786F; margin: 0 0 24px; max-width: 600px; line-height: 1.5; }
  .source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7A786F; margin-top: 16px; letter-spacing: 0.3px; text-transform: uppercase; }
  #chart { margin-top: 24px; position: relative; }
  svg text { font-family: 'Inter', sans-serif; }
  .tooltip { position: absolute; pointer-events: none; background: #2B2A27; color: #F6F5EE; font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 6px 10px; border-radius: 2px; white-space: nowrap; opacity: 0; transition: opacity 0.15s; z-index: 10; line-height: 1.5; }
</style></head><body>
<h1>The Preston Curve, Unwound</h1>
<p class="subtitle">Each line traces a country's path through GDP-per-capita and life-expectancy space from 1960 to 2023. Hover on any point to see the year, GDP, and life expectancy.</p>
<div id="chart"></div>
<div class="tooltip" id="tip"></div>
<p class="source">Source: World Bank NY.GDP.PCAP.CD, SP.DYN.LE00.IN</p>
<script>
const raw = [{"c":"United States","y":1960,"le":69.8,"gdp":3007},{"c":"United States","y":1965,"le":70.2,"gdp":3828},{"c":"United States","y":1970,"le":70.8,"gdp":5234},{"c":"United States","y":1975,"le":72.5,"gdp":7801},{"c":"United States","y":1980,"le":73.6,"gdp":12575},{"c":"United States","y":1985,"le":74.5,"gdp":17697},{"c":"United States","y":1990,"le":75.2,"gdp":23889},{"c":"United States","y":1995,"le":75.6,"gdp":28691},{"c":"United States","y":2000,"le":76.6,"gdp":36330},{"c":"United States","y":2005,"le":77.4,"gdp":44308},{"c":"United States","y":2010,"le":78.5,"gdp":48468},{"c":"United States","y":2015,"le":78.7,"gdp":56443},{"c":"United States","y":2020,"le":77.0,"gdp":63028},{"c":"United States","y":2023,"le":79.7,"gdp":81632},{"c":"China","y":1960,"le":33.4,"gdp":90},{"c":"China","y":1965,"le":53.0,"gdp":99},{"c":"China","y":1970,"le":56.8,"gdp":113},{"c":"China","y":1975,"le":61.0,"gdp":179},{"c":"China","y":1980,"le":64.2,"gdp":195},{"c":"China","y":1985,"le":66.5,"gdp":295},{"c":"China","y":1990,"le":68.2,"gdp":319},{"c":"China","y":1995,"le":70.4,"gdp":613},{"c":"China","y":2000,"le":72.3,"gdp":969},{"c":"China","y":2005,"le":74.1,"gdp":1778},{"c":"China","y":2010,"le":75.7,"gdp":4629},{"c":"China","y":2015,"le":77.0,"gdp":8175},{"c":"China","y":2020,"le":78.0,"gdp":10627},{"c":"China","y":2023,"le":78.0,"gdp":12951},{"c":"India","y":1960,"le":45.6,"gdp":85},{"c":"India","y":1965,"le":45.6,"gdp":122},{"c":"India","y":1970,"le":48.6,"gdp":114},{"c":"India","y":1975,"le":50.8,"gdp":161},{"c":"India","y":1980,"le":53.6,"gdp":271},{"c":"India","y":1985,"le":56.3,"gdp":301},{"c":"India","y":1990,"le":58.6,"gdp":371},{"c":"India","y":1995,"le":60.6,"gdp":375},{"c":"India","y":2000,"le":62.7,"gdp":443},{"c":"India","y":2005,"le":64.9,"gdp":710},{"c":"India","y":2010,"le":67.2,"gdp":1348},{"c":"India","y":2015,"le":69.3,"gdp":1584},{"c":"India","y":2020,"le":70.2,"gdp":1907},{"c":"India","y":2023,"le":72.0,"gdp":2530},{"c":"Brazil","y":1960,"le":53.2,"gdp":235},{"c":"Brazil","y":1965,"le":55.2,"gdp":268},{"c":"Brazil","y":1970,"le":57.3,"gdp":444},{"c":"Brazil","y":1975,"le":59.6,"gdp":1201},{"c":"Brazil","y":1980,"le":61.8,"gdp":1959},{"c":"Brazil","y":1985,"le":64.0,"gdp":1556},{"c":"Brazil","y":1990,"le":65.9,"gdp":2620},{"c":"Brazil","y":1995,"le":67.7,"gdp":4757},{"c":"Brazil","y":2000,"le":69.6,"gdp":3767},{"c":"Brazil","y":2005,"le":71.8,"gdp":4828},{"c":"Brazil","y":2010,"le":73.8,"gdp":11403},{"c":"Brazil","y":2015,"le":75.1,"gdp":8936},{"c":"Brazil","y":2020,"le":74.5,"gdp":7074},{"c":"Brazil","y":2023,"le":75.8,"gdp":10378},{"c":"Japan","y":1960,"le":67.7,"gdp":509},{"c":"Japan","y":1965,"le":70.3,"gdp":994},{"c":"Japan","y":1970,"le":71.9,"gdp":2101},{"c":"Japan","y":1975,"le":74.2,"gdp":4776},{"c":"Japan","y":1980,"le":76.0,"gdp":9669},{"c":"Japan","y":1985,"le":77.6,"gdp":11809},{"c":"Japan","y":1990,"le":78.8,"gdp":25801},{"c":"Japan","y":1995,"le":79.5,"gdp":44198},{"c":"Japan","y":2000,"le":81.1,"gdp":39169},{"c":"Japan","y":2005,"le":82.0,"gdp":37813},{"c":"Japan","y":2010,"le":82.8,"gdp":44968},{"c":"Japan","y":2015,"le":83.8,"gdp":34961},{"c":"Japan","y":2020,"le":84.6,"gdp":40029},{"c":"Japan","y":2023,"le":84.0,"gdp":33836},{"c":"Nigeria","y":1960,"le":38.8,"gdp":93},{"c":"Nigeria","y":1965,"le":40.3,"gdp":107},{"c":"Nigeria","y":1970,"le":41.2,"gdp":135},{"c":"Nigeria","y":1975,"le":42.3,"gdp":373},{"c":"Nigeria","y":1980,"le":44.5,"gdp":867},{"c":"Nigeria","y":1985,"le":46.3,"gdp":326},{"c":"Nigeria","y":1990,"le":46.2,"gdp":325},{"c":"Nigeria","y":1995,"le":45.8,"gdp":229},{"c":"Nigeria","y":2000,"le":46.2,"gdp":377},{"c":"Nigeria","y":2005,"le":49.0,"gdp":807},{"c":"Nigeria","y":2010,"le":51.4,"gdp":2311},{"c":"Nigeria","y":2015,"le":54.0,"gdp":2730},{"c":"Nigeria","y":2020,"le":55.4,"gdp":2097},{"c":"Nigeria","y":2023,"le":53.9,"gdp":1620}];

const W = 700, H = 460;
const margin = { top: 30, right: 80, bottom: 50, left: 55 };
const iw = W - margin.left - margin.right;
const ih = H - margin.top - margin.bottom;

const gdpMin = 70, gdpMax = 100000;
const leMin = 30, leMax = 86;
const xScale = v => margin.left + (Math.log10(v) - Math.log10(gdpMin)) / (Math.log10(gdpMax) - Math.log10(gdpMin)) * iw;
const yScale = v => margin.top + (leMax - v) / (leMax - leMin) * ih;

const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
svg.setAttribute("width", "100%");
svg.style.maxWidth = W + "px";
svg.style.cursor = "crosshair";

const mkEl = (tag, attrs) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  svg.appendChild(el);
  return el;
};

const mkText = (x, y, txt, opts = {}) => {
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("x", x); t.setAttribute("y", y);
  t.setAttribute("font-size", opts.size || "9");
  t.setAttribute("fill", opts.fill || "#7A786F");
  if (opts.anchor) t.setAttribute("text-anchor", opts.anchor);
  if (opts.mono) t.setAttribute("font-family", "'JetBrains Mono', monospace");
  t.textContent = txt;
  svg.appendChild(t);
  return t;
};

// Grid
[100, 1000, 10000].forEach(v => {
  mkEl("line", { x1: xScale(v), y1: margin.top, x2: xScale(v), y2: H - margin.bottom, stroke: "#E2E0D5", "stroke-width": 0.5 });
  mkText(xScale(v), H - margin.bottom + 16, v >= 1000 ? `$${v/1000}k` : `$${v}`, { anchor: "middle", mono: true });
});
[40, 50, 60, 70, 80].forEach(v => {
  mkEl("line", { x1: margin.left, y1: yScale(v), x2: W - margin.right, y2: yScale(v), stroke: "#E2E0D5", "stroke-width": 0.5 });
  mkText(margin.left - 8, yScale(v) + 3, `${v}`, { anchor: "end", mono: true });
});
mkText(W / 2, H - 6, "GDP per capita (current US$, log scale)", { anchor: "middle", size: "10" });
const yLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
yLabel.setAttribute("transform", `rotate(-90) translate(${-(H/2)}, 14)`);
yLabel.setAttribute("font-size", "10"); yLabel.setAttribute("fill", "#7A786F");
yLabel.setAttribute("text-anchor", "middle"); yLabel.textContent = "Life expectancy (years)";
svg.appendChild(yLabel);

const palette = { "United States": "#A6C4A2", "China": "#EA5E33", "India": "#F29A44", "Brazil": "#A6C4A2", "Japan": "#7A786F", "Nigeria": "#F5D38A" };

const countries = {};
raw.forEach(d => { if (!countries[d.c]) countries[d.c] = []; countries[d.c].push(d); });

const trailGroups = {};
const allDots = [];

Object.entries(countries).forEach(([name, pts]) => {
  const col = palette[name] || "#7A786F";
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("data-country", name);

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  let d = "";
  pts.forEach((p, i) => { d += (i === 0 ? "M" : "L") + ` ${xScale(p.gdp)} ${yScale(p.le)}`; });
  path.setAttribute("d", d); path.setAttribute("fill", "none");
  path.setAttribute("stroke", col); path.setAttribute("stroke-width", "1.5"); path.setAttribute("opacity", "0.8");
  g.appendChild(path);

  pts.forEach(p => {
    const x = xScale(p.gdp), y = yScale(p.le);
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", "2");
    c.setAttribute("fill", col);
    g.appendChild(c);

    if (p.y === pts[0].y || p.y === pts[pts.length - 1].y) {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", x + 4); t.setAttribute("y", y - 6);
      t.setAttribute("font-size", "8"); t.setAttribute("fill", col);
      t.setAttribute("font-family", "'JetBrains Mono', monospace");
      t.textContent = String(p.y);
      g.appendChild(t);
    }

    allDots.push({ x, y, p, name, col, circle: c });
  });

  const last = pts[pts.length - 1];
  const offsets = { "United States": [6,-2], "China": [6,4], "India": [-4,12], "Brazil": [6,4], "Japan": [-40,-8], "Nigeria": [6,4] };
  const [ox, oy] = offsets[name] || [6, 4];
  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("x", xScale(last.gdp) + ox); label.setAttribute("y", yScale(last.le) + oy);
  label.setAttribute("font-size", "10"); label.setAttribute("fill", "#2B2A27");
  label.textContent = name;
  g.appendChild(label);

  svg.appendChild(g);
  trailGroups[name] = g;
});

// Hover highlight dot
const hoverDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
hoverDot.setAttribute("r", "5"); hoverDot.setAttribute("fill", "none");
hoverDot.setAttribute("stroke", "#2B2A27"); hoverDot.setAttribute("stroke-width", "1.5");
hoverDot.style.opacity = "0"; hoverDot.style.pointerEvents = "none";
svg.appendChild(hoverDot);

document.getElementById("chart").appendChild(svg);

const tip = document.getElementById("tip");
let activeName = null;

function setActive(name) {
  if (name === activeName) return;
  activeName = name;
  Object.entries(trailGroups).forEach(([n, g]) => {
    if (!name) { g.style.opacity = "1"; }
    else if (n === name) { g.style.opacity = "1"; }
    else { g.style.opacity = "0.12"; }
  });
}

svg.addEventListener("mousemove", e => {
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * W;
  const my = (e.clientY - rect.top) / rect.height * H;

  let best = null, bestDist = 400;
  allDots.forEach(dot => {
    const dx = dot.x - mx, dy = dot.y - my;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) { bestDist = dist; best = dot; }
  });

  if (best && bestDist < 400) {
    setActive(best.name);
    hoverDot.setAttribute("cx", best.x); hoverDot.setAttribute("cy", best.y);
    hoverDot.setAttribute("stroke", best.col);
    hoverDot.style.opacity = "1";

    const gdpFmt = best.p.gdp >= 1000 ? `$${(best.p.gdp/1000).toFixed(1)}k` : `$${best.p.gdp}`;
    tip.innerHTML = `<b>${best.name}, ${best.p.y}</b><br>Life exp: ${best.p.le} yr<br>GDP/cap: ${gdpFmt}`;
    tip.style.opacity = "1";
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY - 30) + "px";
  } else {
    setActive(null);
    hoverDot.style.opacity = "0";
    tip.style.opacity = "0";
  }
});

svg.addEventListener("mouseleave", () => {
  setActive(null);
  hoverDot.style.opacity = "0";
  tip.style.opacity = "0";
});
</script>
</body></html>
