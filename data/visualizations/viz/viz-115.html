          strokeWidth: d => (d.country === "Kenya" || d.country === "Ethiopia") ? 1.8 : 2.2,
          strokeOpacity: d => (d.country === "Kenya" || d.country === "Ethiopia") ? 0.7 : 0.9
        }),
        Plot.text(endpoints, {
          x: "year",
          y: "value",
          text: d => `${d.country} ${(d.value / 1000).toFixed(1)}k`,
          textAnchor: "start",
          dx: 6,
          fontSize: 11,
          fontWeight: 600,
          fill: d => colorMap[d.country]
        }),
        // Green Revolution annotation
        Plot.ruleX([1966], { stroke: "#e2e8f0", strokeDasharray: "4,3" }),
        Plot.text([""], {
          x: [1966],
          y: [7700],
          text: ["Green Revolution begins"],
          textAnchor: "start",
          dx: 4,
          fontSize: 10,
          fill: "#94a3b8",
          fontStyle: "italic"
        })
      ]
    });

    document.getElementById("chart").appendChild(chart);
  </script>
</body>
</html>
