<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 32px 40px 40px;
    background: #F6F5EE;
    color: #2B2A27;
  }

  h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
  .subtitle { font-size: 11px; color: #7A786F; margin: 0 0 20px; max-width: 680px; line-height: 1.5; }
  .source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7A786F; margin-top: 20px; letter-spacing: 0.3px; text-transform: uppercase; }

  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #7A786F;
  }
  .legend-swatch {
    width: 20px;
    height: 3px;
    border-radius: 1px;
  }

  .chart-wrapper {
    position: relative;
  }

  svg text {
    font-family: 'Inter', sans-serif;
  }

  .tooltip {
    position: fixed;
    background: #2B2A27;
    color: #F6F5EE;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
  }

  .annotation {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    fill: #7A786F;
  }

  .key-stat {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    margin-right: 24px;
    margin-bottom: 16px;
  }
  .key-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: #2B2A27;
    letter-spacing: -0.5px;
  }
  .key-stat-label {
    font-size: 10px;
    color: #7A786F;
    margin-top: 1px;
  }
  .key-stats {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 14px 16px;
    background: rgba(43,42,39,0.04);
    border-radius: 4px;
    border: 1px solid #E2E0D5;
  }
</style>
</head>
<body>

<h1>The Malaria Frontier</h1>
<p class="subtitle">Estimated malaria incidence per 1,000 population at risk, 2000-2024. Most of Sub-Saharan Africa has seen meaningful declines, but the burden remains catastrophically high in many countries. Progress is uneven and fragile.</p>

<div class="key-stats" id="keystats"></div>

<div class="legend" id="legend"></div>

<div class="chart-wrapper">
  <svg id="chart"></svg>
</div>

<div class="tooltip" id="tooltip"></div>

<p class="source">Source: WHO GHO MALARIA_EST_INCIDENCE</p>

<script>
const years = [2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];

const rawData = [
  {"code":"MOZ","name":"Mozambique","region":"SSA","series":[473.7,null,494.7,null,459.3,null,null,388,369.6,null,null,376,375.2,null,null,null,null,null,null,324,null,312.4,304.5,null,null],"firstYear":2000,"firstVal":473.7,"lastYear":2022,"lastVal":304.5,"changePct":"-36"},
  {"code":"UGA","name":"Uganda","region":"SSA","series":[482.8,null,null,479.4,null,null,425.6,417.9,417.7,422.8,null,382.9,null,310.3,null,null,null,null,null,250.8,null,null,266.6,null,null],"firstYear":2000,"firstVal":482.8,"lastYear":2022,"lastVal":266.6,"changePct":"-45"},
  {"code":"GHA","name":"Ghana","region":"SSA","series":[430.4,null,392.1,null,null,323.7,311.3,null,null,340.4,null,null,null,null,null,null,null,226.2,null,null,219.6,212.5,210.8,194.9,null],"firstYear":2000,"firstVal":430.4,"lastYear":2023,"lastVal":194.9,"changePct":"-55"},
  {"code":"CIV","name":"Cote d'Ivoire","region":"SSA","series":[490.5,502.2,null,509.6,null,null,null,null,null,426.2,458.1,null,375.2,287.4,243.2,null,null,null,null,null,null,283.6,280.9,269.3,null],"firstYear":2000,"firstVal":490.5,"lastYear":2023,"lastVal":269.3,"changePct":"-45"},
  {"code":"MWI","name":"Malawi","region":"SSA","series":[null,464.5,439.6,null,376.5,373.6,null,null,359.4,377.6,389.8,null,null,null,275,null,null,264.4,null,280.3,null,null,null,291,294.5],"firstYear":2001,"firstVal":464.5,"lastYear":2024,"lastVal":294.5,"changePct":"-37"},
  {"code":"ZMB","name":"Zambia","region":"SSA","series":[360.3,379.2,370,null,null,null,225.9,194.7,171.6,null,169.9,181.1,null,null,null,null,229.1,null,null,null,null,241,246.1,null,null],"firstYear":2000,"firstVal":360.3,"lastYear":2022,"lastVal":246.1,"changePct":"-32"},
  {"code":"CMR","name":"Cameroon","region":"SSA","series":[394.8,null,null,441.4,null,null,null,null,391.6,351.1,null,null,null,null,272.5,271.1,null,null,null,243.4,null,270.7,null,259.1,null],"firstYear":2000,"firstVal":394.8,"lastYear":2023,"lastVal":259.1,"changePct":"-34"},
  {"code":"NER","name":"Niger","region":"SSA","series":[359.2,350.7,327.9,null,302.8,310.5,307.4,null,null,null,410.1,null,428,null,null,null,null,367.8,349.8,null,null,304.2,null,305.1,null],"firstYear":2000,"firstVal":359.2,"lastYear":2023,"lastVal":305.1,"changePct":"-15"},
  {"code":"TZA","name":"Tanzania","region":"SSA","series":[334.6,null,null,278.7,264.9,null,null,null,null,null,null,null,null,131.8,146.4,141.8,null,123.2,111.5,null,null,133.3,132.4,138.5,null],"firstYear":2000,"firstVal":334.6,"lastYear":2023,"lastVal":138.5,"changePct":"-59"},
  {"code":"SLE","name":"Sierra Leone","region":"SSA","series":[null,425.1,425.6,null,405.4,null,null,null,null,445,null,null,413.4,396.1,null,null,363.6,null,null,null,null,null,null,284.1,null],"firstYear":2001,"firstVal":425.1,"lastYear":2023,"lastVal":284.1,"changePct":"-33"},
  {"code":"MLI","name":"Mali","region":"SSA","series":[null,396.2,405.1,412.4,417.9,419.8,null,null,369.2,null,null,null,424.3,441,429.5,381.7,null,null,377.2,null,null,null,null,346.2,null],"firstYear":2001,"firstVal":396.2,"lastYear":2023,"lastVal":346.2,"changePct":"-13"},
  {"code":"BFA","name":"Burkina Faso","region":"SSA","series":[null,null,null,582.1,559,null,null,null,null,568.6,null,null,null,487.1,null,null,373.2,null,null,null,null,378.6,356.3,null,null],"firstYear":2003,"firstVal":582.1,"lastYear":2022,"lastVal":356.3,"changePct":"-39"},
  {"code":"ETH","name":"Ethiopia","region":"SSA","series":[189.2,210.9,null,208.9,null,null,null,null,null,null,null,143.7,159.7,null,144.1,130.1,null,null,36.5,33.6,52.3,45.6,null,null,null],"firstYear":2000,"firstVal":189.2,"lastYear":2021,"lastVal":45.6,"changePct":"-76"},
  {"code":"SEN","name":"Senegal","region":"SSA","series":[null,176.6,157,168.1,129.2,132.3,121.5,98.6,null,null,null,null,null,null,null,69.3,null,null,null,41.1,null,41.9,38.1,34.7,null],"firstYear":2001,"firstVal":176.6,"lastYear":2023,"lastVal":34.7,"changePct":"-80"},
  {"code":"PNG","name":"Papua New Guinea","region":"SEA","series":[null,null,null,217.7,null,null,null,null,164.3,null,null,null,null,null,189.3,null,null,null,null,140.1,null,123.6,null,147.2,151.8],"firstYear":2003,"firstVal":217.7,"lastYear":2024,"lastVal":151.8,"changePct":"-30"},
  {"code":"MMR","name":"Myanmar","region":"SEA","series":[null,null,null,null,34.4,34.4,24.4,null,37.3,null,35.3,30.8,null,14,null,null,null,null,2.4,null,1.8,null,12.5,null,14.8],"firstYear":2004,"firstVal":34.4,"lastYear":2024,"lastVal":14.8,"changePct":"-57"}
];

// Color palette - warm muted tones
// Group by improvement level:
// Strong improvers (>50% decline): teal/green family
// Moderate (30-50%): amber/warm
// Slow (<30%): terracotta/red
// SE Asia: purple/cool

function getColor(d) {
  var pct = parseInt(d.changePct);
  if (d.region === 'SEA') return '#6B8FA8'; // muted blue-grey for SE Asia
  if (pct <= -70) return '#3D7A5A'; // deep green - dramatic improvement
  if (pct <= -50) return '#5B9E78'; // medium green
  if (pct <= -40) return '#8BAD72'; // yellow-green
  if (pct <= -30) return '#C49A45'; // amber
  if (pct <= -20) return '#C4715A'; // orange-terracotta
  return '#B34B3B'; // deep terracotta - slow/stalled
}

// Add colors
rawData.forEach(function(d) {
  d.color = getColor(d);
});

// Key stats
const keyStats = [
  { val: '16', label: 'Countries tracked' },
  { val: '~400', label: 'Cases per 1,000 at risk in highest-burden countries (2000)' },
  { val: '-80%', label: 'Best improvement: Senegal' },
  { val: '-13%', label: 'Least improved: Mali' },
];

const statsEl = document.getElementById('keystats');
keyStats.forEach(function(s) {
  var div = document.createElement('div');
  div.className = 'key-stat';
  div.innerHTML = '<span class="key-stat-val">' + s.val + '</span><span class="key-stat-label">' + s.label + '</span>';
  statsEl.appendChild(div);
});

// Legend
const legendGroups = [
  { color: '#3D7A5A', label: '>70% decline' },
  { color: '#5B9E78', label: '50-70% decline' },
  { color: '#8BAD72', label: '40-50% decline' },
  { color: '#C49A45', label: '30-40% decline' },
  { color: '#C4715A', label: '20-30% decline' },
  { color: '#B34B3B', label: '<20% decline' },
  { color: '#6B8FA8', label: 'SE Asia / Pacific' },
];
const legendEl = document.getElementById('legend');
legendGroups.forEach(function(g) {
  var div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = '<div class="legend-swatch" style="background:' + g.color + '"></div><span>' + g.label + '</span>';
  legendEl.appendChild(div);
});

// Chart dimensions
var margin = { top: 20, right: 160, bottom: 36, left: 54 };
var totalWidth = Math.min(window.innerWidth - 80, 900);
var innerW = totalWidth - margin.left - margin.right;
var innerH = 460;
var totalH = innerH + margin.top + margin.bottom;

var svg = document.getElementById('chart');
svg.setAttribute('width', totalWidth);
svg.setAttribute('height', totalH);
svg.setAttribute('viewBox', '0 0 ' + totalWidth + ' ' + totalH);

var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
g.setAttribute('transform', 'translate(' + margin.left + ',' + margin.top + ')');
svg.appendChild(g);

// Scales
var xMin = 2000, xMax = 2024;
var yMin = 0, yMax = 600;

function xScale(year) {
  return (year - xMin) / (xMax - xMin) * innerW;
}
function yScale(val) {
  return innerH - (val - yMin) / (yMax - yMin) * innerH;
}

// Grid lines
var gridYVals = [0, 100, 200, 300, 400, 500, 600];
gridYVals.forEach(function(yv) {
  var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', 0);
  line.setAttribute('x2', innerW);
  line.setAttribute('y1', yScale(yv));
  line.setAttribute('y2', yScale(yv));
  line.setAttribute('stroke', yv === 0 ? '#C8C5B8' : '#E2E0D5');
  line.setAttribute('stroke-width', yv === 0 ? 1.5 : 1);
  g.appendChild(line);

  // Y-axis labels
  var txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', -8);
  txt.setAttribute('y', yScale(yv) + 4);
  txt.setAttribute('text-anchor', 'end');
  txt.setAttribute('font-size', '9');
  txt.setAttribute('fill', '#9A9890');
  txt.setAttribute('font-family', "JetBrains Mono, monospace");
  txt.textContent = yv === 0 ? '0' : yv;
  g.appendChild(txt);
});

// X axis ticks
var xTicks = [2000, 2005, 2010, 2015, 2020, 2024];
xTicks.forEach(function(yr) {
  var x = xScale(yr);
  var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x);
  line.setAttribute('x2', x);
  line.setAttribute('y1', innerH);
  line.setAttribute('y2', innerH + 4);
  line.setAttribute('stroke', '#C8C5B8');
  line.setAttribute('stroke-width', 1);
  g.appendChild(line);

  var txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', x);
  txt.setAttribute('y', innerH + 16);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('font-size', '9');
  txt.setAttribute('fill', '#9A9890');
  txt.setAttribute('font-family', "JetBrains Mono, monospace");
  txt.textContent = yr;
  g.appendChild(txt);
});

// Y-axis label
var yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
yLabel.setAttribute('transform', 'rotate(-90)');
yLabel.setAttribute('x', -innerH / 2);
yLabel.setAttribute('y', -42);
yLabel.setAttribute('text-anchor', 'middle');
yLabel.setAttribute('font-size', '9');
yLabel.setAttribute('fill', '#9A9890');
yLabel.setAttribute('font-family', "Inter, sans-serif");
yLabel.textContent = 'Incidence per 1,000 population at risk';
g.appendChild(yLabel);

// Draw lines
var tooltip = document.getElementById('tooltip');

// Sort by last value descending for label placement
var sorted = rawData.slice().sort(function(a, b) {
  var av = a.lastVal || 0, bv = b.lastVal || 0;
  return bv - av;
});

// Draw in reverse order so higher-burden countries are on top
sorted.slice().reverse().forEach(function(d) {
  // Build path segments (connected points only)
  var pts = [];
  years.forEach(function(yr, i) {
    if (d.series[i] !== null) {
      pts.push({ x: xScale(yr), y: yScale(d.series[i]), yr: yr, val: d.series[i] });
    }
  });

  if (pts.length < 2) return;

  // Build path - connect with straight lines through gaps
  // (interpolate across null gaps)
  var pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  var d_attr = 'M ' + pts[0].x + ' ' + pts[0].y;
  for (var i = 1; i < pts.length; i++) {
    d_attr += ' L ' + pts[i].x + ' ' + pts[i].y;
  }
  pathEl.setAttribute('d', d_attr);
  pathEl.setAttribute('fill', 'none');
  pathEl.setAttribute('stroke', d.color);
  pathEl.setAttribute('stroke-width', 2);
  pathEl.setAttribute('stroke-linecap', 'round');
  pathEl.setAttribute('stroke-linejoin', 'round');
  pathEl.setAttribute('opacity', '0.85');
  g.appendChild(pathEl);

  // Dots at each data point
  pts.forEach(function(pt) {
    var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', pt.x);
    dot.setAttribute('cy', pt.y);
    dot.setAttribute('r', 2.5);
    dot.setAttribute('fill', d.color);
    dot.setAttribute('opacity', '0.7');
    g.appendChild(dot);
  });

  // Invisible wide line for hover
  var hitEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  hitEl.setAttribute('d', d_attr);
  hitEl.setAttribute('fill', 'none');
  hitEl.setAttribute('stroke', 'transparent');
  hitEl.setAttribute('stroke-width', 12);
  hitEl.style.cursor = 'pointer';
  g.appendChild(hitEl);

  // Last label on right side
  var lastPt = pts[pts.length - 1];
  var labelTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  labelTxt.setAttribute('x', innerW + 8);
  labelTxt.setAttribute('y', lastPt.y + 4);
  labelTxt.setAttribute('font-size', '10');
  labelTxt.setAttribute('fill', d.color);
  labelTxt.setAttribute('font-family', "Inter, sans-serif");
  labelTxt.setAttribute('font-weight', '500');
  labelTxt.textContent = d.name;
  labelTxt.setAttribute('class', 'country-label');
  labelTxt.dataset = { code: d.code };
  g.appendChild(labelTxt);

  // Hover interactions
  function highlight(on) {
    pathEl.setAttribute('stroke-width', on ? 3 : 2);
    pathEl.setAttribute('opacity', on ? 1 : 0.85);
    labelTxt.setAttribute('font-weight', on ? '600' : '500');
  }

  hitEl.addEventListener('mousemove', function(e) {
    // Find nearest data point
    var rect = svg.getBoundingClientRect();
    var mx = e.clientX - rect.left - margin.left;
    var nearestPt = pts.reduce(function(best, pt) {
      return Math.abs(pt.x - mx) < Math.abs(best.x - mx) ? pt : best;
    }, pts[0]);

    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 20) + 'px';
    tooltip.textContent = d.name + ' ' + nearestPt.yr + ': ' + nearestPt.val.toFixed(0) + ' per 1,000';
    highlight(true);
  });

  hitEl.addEventListener('mouseleave', function() {
    tooltip.style.opacity = '0';
    highlight(false);
  });
});

// Adjust overlapping labels on the right side
// After all labels placed, nudge them apart
setTimeout(function() {
  var labels = g.querySelectorAll('.country-label');
  var labelArr = Array.from(labels);

  // Get current y positions and sort
  var yPos = labelArr.map(function(el, i) {
    return { el: el, y: parseFloat(el.getAttribute('y')), i: i };
  }).sort(function(a, b) { return a.y - b.y; });

  var minGap = 12;
  // Iterate to push apart
  for (var iter = 0; iter < 10; iter++) {
    for (var i = 1; i < yPos.length; i++) {
      var gap = yPos[i].y - yPos[i-1].y;
      if (gap < minGap) {
        var push = (minGap - gap) / 2;
        yPos[i-1].y -= push;
        yPos[i].y += push;
      }
    }
  }

  // Clamp to chart bounds
  yPos.forEach(function(item) {
    item.y = Math.max(10, Math.min(item.y, innerH + 10));
    item.el.setAttribute('y', item.y);
  });

  // Add connector lines from label to last data point
  yPos.forEach(function(item) {
    var el = item.el;
    var origY = parseFloat(el.dataset && el.dataset.origY) || parseFloat(el.getAttribute('y'));
    var labelY = item.y;

    // Get the corresponding path's last point by color
    // (We stored enough info in the label element)
    // Small tick from right edge to label
    var tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tick.setAttribute('x1', innerW + 2);
    tick.setAttribute('y1', labelY - 3);
    tick.setAttribute('x2', innerW + 6);
    tick.setAttribute('y2', labelY - 3);
    tick.setAttribute('stroke', el.getAttribute('fill'));
    tick.setAttribute('stroke-width', 1.5);
    g.insertBefore(tick, el);
  });
}, 0);

// Annotation band: "Still above 300 per 1,000" zone
var dangerY = yScale(300);
var dangerBand = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
dangerBand.setAttribute('x', 0);
dangerBand.setAttribute('y', dangerY);
dangerBand.setAttribute('width', innerW);
dangerBand.setAttribute('height', yScale(600) - dangerY);
dangerBand.setAttribute('fill', 'rgba(180,60,40,0.04)');
g.insertBefore(dangerBand, g.firstChild);

// Arrow annotation for the danger zone
var annText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
annText.setAttribute('x', 8);
annText.setAttribute('y', dangerY - 6);
annText.setAttribute('font-size', '9');
annText.setAttribute('fill', '#B34B3B');
annText.setAttribute('font-family', "Inter, sans-serif");
annText.setAttribute('opacity', '0.7');
annText.textContent = '> 300 per 1,000 - extreme burden zone';
g.appendChild(annText);

// Horizontal dashed line at 300
var dashLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
dashLine.setAttribute('x1', 0);
dashLine.setAttribute('x2', innerW);
dashLine.setAttribute('y1', dangerY);
dashLine.setAttribute('y2', dangerY);
dashLine.setAttribute('stroke', '#B34B3B');
dashLine.setAttribute('stroke-width', 1);
dashLine.setAttribute('stroke-dasharray', '4 4');
dashLine.setAttribute('opacity', '0.3');
g.appendChild(dashLine);

</script>
</body></html>
