<!DOCTYPE html>
<html>

  <style>

    h1 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }

<body>
  <h1>Malaria Incidence in High-Burden Countries</h1>

  <div id="chart"></div>
  <p class="source">Source: WHO Global Health Observatory</p>
  <script type="module">
    import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";
    const raw = [{"n":"Uganda","y":2000,"v":482.8},{"n":"Mozambique","y":2000,"v":473.7},{"n":"Ghana","y":2000,"v":430.4},{"n":"Cameroon","y":2000,"v":394.8},{"n":"Niger","y":2000,"v":359.2},{"n":"Tanzania","y":2000,"v":334.6},{"n":"Ethiopia","y":2000,"v":189.2},{"n":"Rwanda","y":2000,"v":180.4},{"n":"Niger","y":2001,"v":350.7},{"n":"Ethiopia","y":2001,"v":210.9},{"n":"Rwanda","y":2001,"v":171.3},{"n":"India","y":2001,"v":21.6},{"n":"Mozambique","y":2002,"v":494.7},{"n":"Ghana","y":2002,"v":392.1},{"n":"Niger","y":2002,"v":327.9},{"n":"India","y":2002,"v":19.5},{"n":"Uganda","y":2003,"v":479.4},{"n":"Cameroon","y":2003,"v":441.4},{"n":"Tanzania","y":2003,"v":278.7},{"n":"Ethiopia","y":2003,"v":208.9},{"n":"Rwanda","y":2003,"v":139.2},{"n":"India","y":2003,"v":20.3},{"n":"Mozambique","y":2004,"v":459.3},{"n":"Niger","y":2004,"v":302.8},{"n":"Tanzania","y":2004,"v":264.9},{"n":"India","y":2004,"v":21.8},{"n":"Ghana","y":2005,"v":323.7},{"n":"Niger","y":2005,"v":310.5},{"n":"Uganda","y":2006,"v":425.6},{"n":"Nigeria","y":2006,"v":398.6},{"n":"Ghana","y":2006,"v":311.3},{"n":"Niger","y":2006,"v":307.4},{"n":"Rwanda","y":2006,"v":150.1},{"n":"Uganda","y":2007,"v":417.9},{"n":"Mozambique","y":2007,"v":388},{"n":"Uganda","y":2008,"v":417.7},{"n":"Cameroon","y":2008,"v":391.6},{"n":"Mozambique","y":2008,"v":369.6},{"n":"India","y":2008,"v":14.5},{"n":"Uganda","y":2009,"v":422.8},{"n":"Nigeria","y":2009,"v":390},{"n":"Cameroon","y":2009,"v":351.1},{"n":"Ghana","y":2009,"v":340.4},{"n":"Niger","y":2010,"v":410.1},{"n":"Nigeria","y":2010,"v":363.4},{"n":"India","y":2010,"v":13.1},{"n":"Uganda","y":2011,"v":382.9},{"n":"Mozambique","y":2011,"v":376},{"n":"Nigeria","y":2011,"v":339.5},{"n":"Ethiopia","y":2011,"v":143.7},{"n":"Rwanda","y":2011,"v":36.9},{"n":"Niger","y":2012,"v":428},{"n":"Mozambique","y":2012,"v":375.2},{"n":"Ethiopia","y":2012,"v":159.7},{"n":"India","y":2012,"v":8.1},{"n":"Uganda","y":2013,"v":310.3},{"n":"Tanzania","y":2013,"v":131.8},{"n":"India","y":2013,"v     const data = raw.map(d => ({ country: d.n, year: d.y, value: d.v }));
    const last = new Map();
    for (const d of data) {
      if (!last.has(d.country) || d.year > last.get(d.country).year) {
        last.set(d.country, d);
      }
    }
    const endpoints = [...last.values()];
    const chart = Plot.plot({
      width: 900, height: 500, marginRight: 110, marginTop: 10, marginBottom: 40,
      x: { label: null, tickFormat: "d" },
      y: { label: "Cases per 1,000", grid: true },
      color: {
        domain: ["Uganda", "Mozambique", "Ghana", "Cameroon", "Niger", "Tanzania", "Ethiopia", "Rwanda", "Nigeria", "India"],
        range: ["#e41a1c", "#377eb8", "#4daf4a", "#984ea3", "#ff7f00", "#a65628", "#f781bf", "#66c2a5", "#e7298a", "#333333"]
      },
      marks: [
        Plot.ruleY([0]),
        Plot.line(data, { x: "year", y: "value", stroke: "country", strokeWidth: 1.8, curve: "natural" }),
        Plot.dot(endpoints, { x: "year", y: "value", fill: "country", r: 3 }),
        Plot.text(endpoints, { x: "year", y: "value", text: d => d.country, fill: "country", dx: 6, textAnchor: "start", fontSize: 10, fontWeight: 600 })
      ]
    });
    document.getElementById("chart").appendChild(chart);
  </script>
