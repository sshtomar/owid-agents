<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; margin: 0; padding: 24px; background: #fff; color: #0f172a; }
    h1 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin: 0 0 20px; }
    #chart { width: 100%; }
    .source { font-size: 11px; color: #94a3b8; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Saving Children: Under-5 Mortality, 2000 vs 2020</h1>
  <p class="subtitle">Under-5 deaths per 1,000 live births -- 18 countries showing dramatic declines and rare reversals</p>
  <div id="chart"></div>
  <p class="source">Source: World Bank -- Mortality rate, under-5 (per 1,000 live births) -- indicator SH.DYN.MORT</p>
  <script type="module">
    import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";

    const data = [
      { country: "Angola", y2000: 203.0, y2020: 71.6, group: "dramatic" },
      { country: "Chad", y2000: 183.6, y2020: 111.0, group: "high" },
      { country: "Guinea-Bissau", y2000: 173.8, y2020: 76.6, group: "dramatic" },
      { country: "Burkina Faso", y2000: 178.1, y2020: 85.3, group: "dramatic" },
      { country: "Ethiopia", y2000: 140.4, y2020: 52.0, group: "dramatic" },
      { country: "Cambodia", y2000: 105.9, y2020: 25.6, group: "dramatic" },
      { country: "Eswatini", y2000: 109.1, y2020: 49.8, group: "moderate" },
      { country: "India", y2000: 91.6, y2020: 32.4, group: "dramatic" },
      { country: "Ghana", y2000: 100.2, y2020: 42.0, group: "moderate" },
      { country: "Kenya", y2000: 96.3, y2020: 42.8, group: "moderate" },
      { country: "Bangladesh", y2000: 85.4, y2020: 31.5, group: "dramatic" },
      { country: "Botswana", y2000: 81.1, y2020: 43.9, group: "moderate" },
      { country: "Bolivia", y2000: 75.7, y2020: 25.7, group: "dramatic" },
      { country: "Indonesia", y2000: 51.9, y2020: 22.8, group: "moderate" },
      { country: "China", y2000: 36.7, y2020: 7.5, group: "moderate" },
      { country: "Brazil", y2000: 34.5, y2020: 14.9, group: "moderate" },
      { country: "Fiji", y2000: 22.7, y2020: 27.2, group: "reversal" },
      { country: "Dominica", y2000: 19.4, y2020: 33.8, group: "reversal" }
    ];

    // Build slope data: two points per country
    const slopeData = data.flatMap(d => [
      { country: d.country, year: "2000", value: d.y2000, group: d.group },
      { country: d.country, year: "2020", value: d.y2020, group: d.group }
    ]);

    const groupColor = d =>
      d.group === "reversal" ? "#ef4444" :
      d.group === "dramatic" ? "#2563eb" :
      "#64748b";

    const chart = Plot.plot({
      width: 900,
      height: 640,
      marginLeft: 120,
      marginRight: 120,
      marginTop: 20,
      marginBottom: 40,
      x: {
        domain: ["2000", "2020"],
        padding: 0.4,
        label: null,
        tickSize: 0,
        tickFormat: d => d,
        labelAnchor: "center"
      },
      y: {
        domain: [0, 220],
        label: "Deaths per 1,000 live births",
        grid: true,
        tickSize: 0,
        ticks: [0, 50, 100, 150, 200]
      },
      marks: [
        // Slope lines
        Plot.line(slopeData, {
          x: "year",
          y: "value",
          z: "country",
          stroke: d => groupColor(d),
          strokeWidth: 2,
          strokeOpacity: 0.7
        }),
        // Dots at both endpoints
        Plot.dot(slopeData, {
          x: "year",
          y: "value",
          fill: d => groupColor(d),
          r: 4
        }),
        // Left labels (2000)
        Plot.text(
          data.map(d => ({
            country: d.country,
            year: "2000",
            value: d.y2000,
            group: d.group,
            label: `${d.country} ${d.y2000}`
          })),
          {
            x: "year",
            y: "value",
            text: "label",
            fill: d => groupColor(d),
            textAnchor: "end",
            dx: -10,
            fontSize: 10,
            fontWeight: 600
          }
        ),
        // Right labels (2020)
        Plot.text(
          data.map(d => ({
            country: d.country,
            year: "2020",
            value: d.y2020,
            group: d.group,
            label: `${d.y2020} ${d.country}`
          })),
          {
            x: "year",
            y: "value",
            text: "label",
            fill: d => groupColor(d),
            textAnchor: "start",
            dx: 10,
            fontSize: 10,
            fontWeight: 600
          }
        ),
        // Year headers
        Plot.text(
          [{ year: "2000", value: 215, label: "2000" }, { year: "2020", value: 215, label: "2020" }],
          {
            x: "year",
            y: "value",
            text: "label",
            fontWeight: 700,
            fontSize: 14,
            fill: "#0f172a"
          }
        ),
        // Legend annotations
        Plot.text(
          [{ year: "2020", value: 205, label: "Blue = large decline | Gray = moderate | Red = increase" }],
          {
            x: "year",
            y: "value",
            text: "label",
            fontSize: 10,
            fill: "#94a3b8",
            textAnchor: "middle"
          }
        )
      ]
    });

    document.getElementById("chart").appendChild(chart);
  </script>
</body>
</html>
