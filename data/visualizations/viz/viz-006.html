<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  body { font-family: 'Inter', sans-serif; margin: 0; padding: 32px 40px; background: #F6F5EE; color: #2B2A27; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
  .subtitle { font-size: 11px; color: #7A786F; margin: 0 0 24px; max-width: 600px; line-height: 1.5; }
  .source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7A786F; margin-top: 20px; letter-spacing: 0.3px; text-transform: uppercase; }
  svg text { font-family: 'Inter', sans-serif; }
  .tooltip { position: absolute; pointer-events: none; background: #2B2A27; color: #F6F5EE; font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 6px 10px; border-radius: 2px; white-space: nowrap; opacity: 0; transition: opacity 0.15s; z-index: 10; line-height: 1.5; }
</style></head><body>
<h1>The Demographic Transition</h1>
<p class="subtitle">Fertility rate (births per woman), 1960--2023. The replacement level of 2.1 is marked. Every country shown has fallen toward or below it. Hover to trace a country's path.</p>
<div id="chart" style="position:relative;"></div>
<div class="tooltip" id="tip"></div>
<p class="source">Source: World Bank SP.DYN.TFRT.IN</p>
<script>
const data = [{"c":"JP","n":"Japan","pts":[{"y":1960,"v":2},{"y":1965,"v":2.14},{"y":1970,"v":2.13},{"y":1975,"v":1.91},{"y":1980,"v":1.75},{"y":1985,"v":1.76},{"y":1990,"v":1.54},{"y":1995,"v":1.42},{"y":2000,"v":1.36},{"y":2005,"v":1.26},{"y":2010,"v":1.39},{"y":2015,"v":1.45},{"y":2020,"v":1.33},{"y":2023,"v":1.2}]},{"c":"KR","n":"South Korea","pts":[{"y":1970,"v":4.53},{"y":1975,"v":3.43},{"y":1980,"v":2.82},{"y":1985,"v":1.66},{"y":1990,"v":1.57},{"y":1995,"v":1.63},{"y":2000,"v":1.48},{"y":2005,"v":1.08},{"y":2010,"v":1.23},{"y":2015,"v":1.24},{"y":2020,"v":0.84},{"y":2023,"v":0.72}]},{"c":"BR","n":"Brazil","pts":[{"y":1960,"v":6.05},{"y":1965,"v":5.68},{"y":1970,"v":4.93},{"y":1975,"v":4.42},{"y":1980,"v":4.04},{"y":1985,"v":3.48},{"y":1990,"v":2.9},{"y":1995,"v":2.57},{"y":2000,"v":2.25},{"y":2005,"v":1.94},{"y":2010,"v":1.79},{"y":2015,"v":1.78},{"y":2020,"v":1.65},{"y":2023,"v":1.62}]},{"c":"IN","n":"India","pts":[{"y":1960,"v":5.92},{"y":1965,"v":5.94},{"y":1970,"v":5.62},{"y":1975,"v":5.2},{"y":1980,"v":4.78},{"y":1985,"v":4.43},{"y":1990,"v":4.04},{"y":1995,"v":3.65},{"y":2000,"v":3.35},{"y":2005,"v":2.96},{"y":2010,"v":2.6},{"y":2015,"v":2.29},{"y":2020,"v":2.05},{"y":2023,"v":1.98}]},{"c":"BD","n":"Bangladesh","pts":[{"y":1960,"v":6.74},{"y":1965,"v":6.77},{"y":1970,"v":6.84},{"y":1975,"v":6.73},{"y":1980,"v":6.33},{"y":1985,"v":5.54},{"y":1990,"v":4.51},{"y":1995,"v":3.59},{"y":2000,"v":3.28},{"y":2005,"v":2.85},{"y":2010,"v":2.38},{"y":2015,"v":2.23},{"y":2020,"v":2.17},{"y":2023,"v":2.16}]},{"c":"IR","n":"Iran","pts":[{"y":1960,"v":7.52},{"y":1965,"v":7.22},{"y":1970,"v":6.8},{"y":1975,"v":5.95},{"y":1980,"v":6.63},{"y":1985,"v":6.24},{"y":1990,"v":4.93},{"y":1995,"v":2.85},{"y":2000,"v":2.0},{"y":2005,"v":1.76},{"y":2010,"v":1.75},{"y":2015,"v":2.02},{"y":2020,"v":1.7},{"y":2023,"v":1.7}]},{"c":"ET","n":"Ethiopia","pts":[{"y":1960,"v":6.51},{"y":1965,"v":6.63},{"y":1970,"v":6.78},{"y":1975,"v":7.08},{"y":1980,"v":7.29},{"y":1985,"v":7.34},{"y":1990,"v":7.2},{"y":1995,"v":7.0},{"y":2000,"v":6.65},{"y":2005,"v":6.19},{"y":2010,"v":5.28},{"y":2015,"v":4.53},{"y":2020,"v":4.27},{"y":2023,"v":3.99}]},{"c":"CN","n":"China","pts":[{"y":1960,"v":4.45},{"y":1965,"v":6.61},{"y":1970,"v":6.08},{"y":1975,"v":3.57},{"y":1980,"v":2.74},{"y":1985,"v":2.63},{"y":1990,"v":2.51},{"y":1995,"v":1.59},{"y":2000,"v":1.63},{"y":2005,"v":1.62},{"y":2010,"v":1.69},{"y":2015,"v":1.67},{"y":2020,"v":1.24},{"y":2023,"v":1.0}]},{"c":"EG","n":"Egypt","pts":[{"y":1960,"v":6.79},{"y":1965,"v":6.39},{"y":1970,"v":6.06},{"y":1975,"v":5.75},{"y":1980,"v":5.49},{"y":1985,"v":5.12},{"y":1990,"v":4.51},{"y":1995,"v":3.76},{"y":2000,"v":3.5},{"y":2005,"v":3.25},{"y":2010,"v":3.3},{"y":2015,"v":3.5},{"y":2020,"v":2.85},{"y":2023,"v":2.75}]},{"c":"KE","n":"Kenya","pts":[{"y":1960,"v":7.65},{"y":1965,"v":7.92},{"y":1970,"v":7.94},{"y":1975,"v":7.79},{"y":1980,"v":7.53},{"y":1985,"v":6.96},{"y":1990,"v":6.13},{"y":1995,"v":5.37},{"y":2000,"v":5.14},{"y":2005,"v":4.8},{"y":2010,"v":4.45},{"y":2015,"v":3.77},{"y":2020,"v":3.36},{"y":2023,"v":3.21}]}];

const palette = {"JP":"#7A786F","KR":"#EA5E33","BR":"#A6C4A2","IN":"#F29A44","BD":"#F5D38A",
  "IR":"#EA5E33","ET":"#C2C0B5","CN":"#EA5E33","EG":"#F29A44","KE":"#A6C4A2"};

const W = 700, H = 400;
const margin = { top: 30, right: 90, bottom: 40, left: 40 };
const iw = W - margin.left - margin.right;
const ih = H - margin.top - margin.bottom;

const xMin = 1958, xMax = 2025;
const yMin = 0, yMax = 8.5;
const xScale = v => margin.left + (v - xMin) / (xMax - xMin) * iw;
const yScale = v => margin.top + (yMax - v) / (yMax - yMin) * ih;

const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
svg.setAttribute("width", "100%");
svg.style.maxWidth = W + "px";
svg.style.cursor = "crosshair";

const mkEl = (tag, attrs) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  svg.appendChild(el);
  return el;
};

const mkText = (x, y, txt, opts = {}) => {
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("x", x); t.setAttribute("y", y);
  t.setAttribute("font-size", opts.size || "9");
  t.setAttribute("fill", opts.fill || "#7A786F");
  if (opts.anchor) t.setAttribute("text-anchor", opts.anchor);
  if (opts.mono) t.setAttribute("font-family", "'JetBrains Mono', monospace");
  t.textContent = txt;
  svg.appendChild(t);
  return t;
};

// Grid
[1960, 1980, 2000, 2020].forEach(v => {
  mkEl("line", { x1: xScale(v), y1: margin.top, x2: xScale(v), y2: H - margin.bottom, stroke: "#E2E0D5", "stroke-width": 0.5 });
  mkText(xScale(v), H - margin.bottom + 14, String(v), { anchor: "middle", mono: true });
});
[0, 2, 4, 6, 8].forEach(v => {
  mkEl("line", { x1: margin.left, y1: yScale(v), x2: W - margin.right, y2: yScale(v), stroke: "#E2E0D5", "stroke-width": 0.5 });
  mkText(margin.left - 6, yScale(v) + 3, String(v), { anchor: "end", mono: true });
});

// Replacement level line
mkEl("line", { x1: margin.left, y1: yScale(2.1), x2: W - margin.right, y2: yScale(2.1), stroke: "#EA5E33", "stroke-width": 1, "stroke-dasharray": "4 3", opacity: 0.5 });
mkText(W - margin.right + 4, yScale(2.1) + 3, "2.1 replacement", { size: "8", mono: true, fill: "#EA5E33" });

// Y axis label
const yLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
yLabel.setAttribute("transform", `rotate(-90) translate(${-(H/2)}, 12)`);
yLabel.setAttribute("font-size", "10"); yLabel.setAttribute("fill", "#7A786F");
yLabel.setAttribute("text-anchor", "middle"); yLabel.textContent = "Births per woman";
svg.appendChild(yLabel);

const trails = {};
const allDots = [];

data.forEach(d => {
  const col = palette[d.c] || "#7A786F";
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  let pathD = "";
  d.pts.forEach((p, i) => { pathD += (i === 0 ? "M" : "L") + ` ${xScale(p.y)} ${yScale(p.v)}`; });
  path.setAttribute("d", pathD);
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", col);
  path.setAttribute("stroke-width", "1.5");
  path.setAttribute("opacity", "0.7");
  g.appendChild(path);

  d.pts.forEach(p => {
    const cx = xScale(p.y), cy = yScale(p.v);
    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", cx); dot.setAttribute("cy", cy);
    dot.setAttribute("r", "1.5"); dot.setAttribute("fill", col);
    g.appendChild(dot);
    allDots.push({ x: cx, y: cy, p, name: d.n, code: d.c, col, circle: dot });
  });

  // End label
  const last = d.pts[d.pts.length - 1];
  const lx = xScale(last.y) + 4;
  const ly = yScale(last.v);
  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("x", lx); label.setAttribute("y", ly + 3);
  label.setAttribute("font-size", "9"); label.setAttribute("fill", "#2B2A27");
  label.textContent = d.n;
  g.appendChild(label);

  svg.appendChild(g);
  trails[d.c] = g;
});

// Hover dot
const hoverDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
hoverDot.setAttribute("r", "4"); hoverDot.setAttribute("fill", "none");
hoverDot.setAttribute("stroke", "#2B2A27"); hoverDot.setAttribute("stroke-width", "1.5");
hoverDot.style.opacity = "0"; hoverDot.style.pointerEvents = "none";
svg.appendChild(hoverDot);

document.getElementById("chart").appendChild(svg);

const tip = document.getElementById("tip");
let activeName = null;

function setActive(code) {
  if (code === activeName) return;
  activeName = code;
  Object.entries(trails).forEach(([c, g]) => {
    if (!code) g.style.opacity = "1";
    else if (c === code) g.style.opacity = "1";
    else g.style.opacity = "0.1";
  });
}

svg.addEventListener("mousemove", e => {
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * W;
  const my = (e.clientY - rect.top) / rect.height * H;

  let best = null, bestDist = 400;
  allDots.forEach(dot => {
    const dx = dot.x - mx, dy = dot.y - my;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) { bestDist = dist; best = dot; }
  });

  if (best) {
    setActive(best.code);
    hoverDot.setAttribute("cx", best.x); hoverDot.setAttribute("cy", best.y);
    hoverDot.setAttribute("stroke", best.col);
    hoverDot.style.opacity = "1";
    tip.innerHTML = `<b>${best.name}, ${best.p.y}</b><br>${best.p.v} births/woman`;
    tip.style.opacity = "1";
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY - 30) + "px";
  } else {
    setActive(null);
    hoverDot.style.opacity = "0";
    tip.style.opacity = "0";
  }
});

svg.addEventListener("mouseleave", () => {
  setActive(null);
  hoverDot.style.opacity = "0";
  tip.style.opacity = "0";
});
</script>
</body></html>
