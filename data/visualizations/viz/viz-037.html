<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; margin: 0; padding: 32px 40px; background: #F6F5EE; color: #2B2A27; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
  .subtitle { font-size: 11px; color: #7A786F; margin: 0 0 24px; max-width: 600px; line-height: 1.5; }
  .source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7A786F; margin-top: 14px; letter-spacing: 0.3px; text-transform: uppercase; }
  #chart-wrap { position: relative; }
  svg { display: block; }
  .tooltip {
    position: absolute;
    background: #2B2A27;
    color: #F6F5EE;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
  }
  .tooltip .tt-country { font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; margin-bottom: 2px; }
  .tooltip .tt-val { color: #83BFB0; }
</style>
</head><body>
<h1>Open Doors</h1>
<p class="subtitle">Top 20 countries hosting the most refugees in 2024 by total number of people granted asylum. Values shown in millions. Iran, T&uuml;rkiye, and Germany lead, each sheltering over 2.7 million refugees.</p>
<div id="chart-wrap">
  <div class="tooltip" id="tooltip">
    <div class="tt-country" id="tt-country"></div>
    <div id="tt-detail"></div>
  </div>
</div>
<p class="source">Source: UNHCR Population Statistics</p>

<script>
const DATA = [
  { name: 'Iran', value: 3489257 },
  { name: 'T\u00fcrkiye', value: 2940735 },
  { name: 'Germany', value: 2749266 },
  { name: 'Uganda', value: 1759492 },
  { name: 'Pakistan', value: 1560480 },
  { name: 'Chad', value: 1278866 },
  { name: 'Poland', value: 1008871 },
  { name: 'Ethiopia', value: 1008826 },
  { name: 'Bangladesh', value: 1005602 },
  { name: 'Sudan', value: 793395 },
  { name: 'Lebanon', value: 758642 },
  { name: 'France', value: 721771 },
  { name: 'Jordan', value: 643641 },
  { name: 'Kenya', value: 604257 },
  { name: 'DR Congo', value: 517404 },
  { name: 'United Kingdom', value: 515677 },
  { name: 'South Sudan', value: 514794 },
  { name: 'United States', value: 435333 },
  { name: 'Spain', value: 429333 },
  { name: 'Cameroon', value: 427706 }
];

const maxVal = DATA[0].value;

// layout
const W = 820, H = 620;
const ML = 120, MR = 70, MT = 10, MB = 30;
const PW = W - ML - MR, PH = H - MT - MB;
const barH = Math.floor(PH / DATA.length) - 4;
const barGap = Math.floor(PH / DATA.length);

// teal/blue-green palette with slight variation
const COLORS = [
  '#3D8B7A', '#4A9485', '#579D90', '#5BA393', '#62A898',
  '#6AAE9E', '#72B3A3', '#7AB8A9', '#83BFB0', '#8BC4B5',
  '#3D8B7A', '#4A9485', '#579D90', '#5BA393', '#62A898',
  '#6AAE9E', '#72B3A3', '#7AB8A9', '#83BFB0', '#8BC4B5'
];

function fmtM(v) {
  return (v / 1e6).toFixed(2) + 'M';
}

function fmtShort(v) {
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  return (v / 1e3).toFixed(0) + 'K';
}

function fmtFull(v) {
  return v.toLocaleString('en-US');
}

function el(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

const wrap = document.getElementById('chart-wrap');
const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H });
wrap.insertBefore(svg, wrap.firstChild);

// x-axis grid lines
const xTicks = [0, 0.5e6, 1e6, 1.5e6, 2e6, 2.5e6, 3e6, 3.5e6];
xTicks.forEach(v => {
  const x = ML + (v / maxVal) * PW;
  el('line', {
    x1: x, x2: x,
    y1: MT, y2: MT + PH,
    stroke: v === 0 ? '#C8C6BA' : '#E2E0D5',
    'stroke-width': 1
  }, svg);
});

// x-axis labels
xTicks.forEach(v => {
  const x = ML + (v / maxVal) * PW;
  const t = el('text', {
    x: x, y: MT + PH + 18,
    'text-anchor': 'middle',
    'font-family': 'JetBrains Mono, monospace',
    'font-size': '9',
    fill: '#9A9890'
  }, svg);
  t.textContent = v === 0 ? '0' : fmtShort(v);
});

// bars, country labels, value labels
const barEls = [];
DATA.forEach((d, i) => {
  const y = MT + i * barGap + (barGap - barH) / 2;
  const barW = (d.value / maxVal) * PW;

  // country label
  const label = el('text', {
    x: ML - 8, y: y + barH / 2 + 3.5,
    'text-anchor': 'end',
    'font-family': 'Inter, sans-serif',
    'font-size': '10',
    'font-weight': '500',
    fill: '#2B2A27'
  }, svg);
  label.textContent = d.name;

  // bar
  const bar = el('rect', {
    x: ML, y: y,
    width: barW, height: barH,
    rx: 2, ry: 2,
    fill: COLORS[i],
    opacity: 0.85,
    'data-index': i
  }, svg);
  bar.style.cursor = 'pointer';
  bar.style.transition = 'opacity 0.12s';

  // value label at end of bar
  const valLabel = el('text', {
    x: ML + barW + 6, y: y + barH / 2 + 3.5,
    'text-anchor': 'start',
    'font-family': 'JetBrains Mono, monospace',
    'font-size': '9',
    fill: '#7A786F'
  }, svg);
  valLabel.textContent = fmtShort(d.value);

  barEls.push({ bar, label, valLabel, y, barW });
});

// hit zones for better hover detection
DATA.forEach((d, i) => {
  const y = MT + i * barGap + (barGap - barH) / 2;
  const hit = el('rect', {
    x: 0, y: y - 2,
    width: W, height: barH + 4,
    fill: 'transparent',
    'data-index': i
  }, svg);
  hit.style.cursor = 'pointer';

  hit.addEventListener('mouseenter', () => onBarEnter(i));
  hit.addEventListener('mouseleave', onBarLeave);
  hit.addEventListener('mousemove', (e) => onBarMove(e, i));
});

// tooltip elements
const tooltip = document.getElementById('tooltip');
const ttCountry = document.getElementById('tt-country');
const ttDetail = document.getElementById('tt-detail');

function onBarEnter(idx) {
  DATA.forEach((_, i) => {
    const be = barEls[i];
    be.bar.setAttribute('opacity', i === idx ? 1 : 0.3);
    be.label.setAttribute('opacity', i === idx ? 1 : 0.35);
    be.valLabel.setAttribute('opacity', i === idx ? 1 : 0.35);
  });
}

function onBarLeave() {
  DATA.forEach((_, i) => {
    const be = barEls[i];
    be.bar.setAttribute('opacity', 0.85);
    be.label.setAttribute('opacity', 1);
    be.valLabel.setAttribute('opacity', 1);
  });
  tooltip.style.opacity = '0';
}

function onBarMove(e, idx) {
  const d = DATA[idx];
  const pct = ((d.value / maxVal) * 100).toFixed(1);

  ttCountry.textContent = d.name;
  ttCountry.style.color = COLORS[idx];
  ttDetail.innerHTML = '<span class="tt-val">' + fmtFull(d.value) + ' refugees</span>' +
    '<br><span style="color:#9A9890">' + fmtM(d.value) + ' \u2014 Rank #' + (idx + 1) + '</span>';

  tooltip.style.opacity = '1';

  const wrapRect = wrap.getBoundingClientRect();
  let tx = e.clientX - wrapRect.left + 14;
  let ty = e.clientY - wrapRect.top - 36;

  if (tx + 200 > wrapRect.width) tx = e.clientX - wrapRect.left - 200;
  if (ty < 0) ty = e.clientY - wrapRect.top + 14;

  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}
</script>
</body></html>
